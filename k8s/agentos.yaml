apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentos
  namespace: agentos
  labels:
    app: agentos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentos
  template:
    metadata:
      labels:
        app: agentos
    spec:
      containers:
        - name: agentos
          # Docker Desktop shares images with its k8s cluster — no registry needed.
          # Build locally with: docker build -t agentos:latest .
          image: agentos:latest
          imagePullPolicy: Never
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: agentos-config
            - secretRef:
                name: agentos-secrets
          env:
            - name: WAIT_FOR_DB
              value: "True"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z agentos-db 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready"
---
apiVersion: v1
kind: Service
metadata:
  name: agentos
  namespace: agentos
spec:
  selector:
    app: agentos
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30080
  type: NodePort

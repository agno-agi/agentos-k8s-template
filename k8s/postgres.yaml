# PostgreSQL + PgVector for local development
# For production, use a managed database (RDS, Cloud SQL, etc.)
#
# Uses emptyDir for storage — data is lost when the pod is deleted.
# This is fine for local dev. For persistence, switch to a StatefulSet with PVC.
apiVersion: v1
kind: Service
metadata:
  name: agentos-db
  namespace: agentos
spec:
  selector:
    app: agentos-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentos-db
  namespace: agentos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentos-db
  template:
    metadata:
      labels:
        app: agentos-db
    spec:
      containers:
        - name: postgres
          image: agnohq/pgvector:18
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: agentos-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentos-secrets
                  key: DB_PASS
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: agentos-config
                  key: DB_DATABASE
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ai
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ai
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: pgdata
          emptyDir: {}
